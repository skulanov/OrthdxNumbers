<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Церковнославянские числа</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Подразумевается, что шрифт Pochaevsk доступен в системе или через ваш CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Церковнославянские числа</h1>
        <div class="mode-selector">
            <button id="mode1Btn" class="btn btn-mode active">Простые числа</button>
            <button id="mode2Btn" class="btn btn-mode">Составные числа</button>
        </div>
    </header>

    <main>
        <div class="card-container">
            <div class="flashcard" id="flashcard">
                <div class="card-content">
                    <div class="letter" id="numberSlav">а҃</div>
                    <div class="letter-name" id="numberArab">1</div>
                </div>
            </div>
        </div>

        <div class="remember-section">
            <button id="rememberBtn" class="btn btn-remember">Помню</button>
        </div>
    </main>

    <footer>
        <p>by Dima Skulanov 2026</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
